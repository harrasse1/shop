<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Gold gradient for the H -->
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbe89a"/>
      <stop offset="20%" stop-color="#e6c560"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="80%" stop-color="#b88a25"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>

    <!-- Gold gradient for cart -->
    <linearGradient id="goldCart" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#e6c560"/>
      <stop offset="100%" stop-color="#a87c1f"/>
    </linearGradient>

    <!-- White gradient for text -->
    <linearGradient id="whiteText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcdcdc"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="600" height="600" fill="#0a0a0a"/>

  <!-- ==================== TOP ICONS GROUP ==================== -->
  <g transform="translate(300, 220)" filter="url(#softShadow)">

    <!-- Globe wireframe (left of H) -->
    <g transform="translate(-130, 0)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="58"/>
      <ellipse cx="0" cy="0" rx="58" ry="22"/>
      <ellipse cx="0" cy="0" rx="22" ry="58"/>
      <line x1="-58" y1="0" x2="58" y2="0"/>
      <line x1="0" y1="-58" x2="0" y2="58"/>
    </g>

    <!-- Big gold H (stylized) -->
    <g fill="url(#goldH)" filter="url(#goldGlow)">
      <!-- Left vertical -->
      <path d="M -50 -100 L -20 -100 L -20 100 L -50 100 Z"/>
      <!-- Right vertical -->
      <path d="M 20 -100 L 50 -100 L 50 100 L 20 100 Z"/>
      <!-- Horizontal bar -->
      <path d="M -50 -15 L 50 -15 L 50 15 L -50 15 Z"/>

      <!-- Decorative serif tops -->
      <path d="M -60 -100 L -10 -100 L -10 -90 L -60 -90 Z"/>
      <path d="M 10 -100 L 60 -100 L 60 -90 L 10 -90 Z"/>

      <!-- Decorative serif bottoms -->
      <path d="M -60 90 L -10 90 L -10 100 L -60 100 Z"/>
      <path d="M 10 90 L 60 90 L 60 100 L 10 100 Z"/>

      <!-- Curved decorative tail (flowing curve under H) -->
      <path d="M -80 80 Q -40 130, 30 110 Q 70 100, 90 80 L 95 95 Q 70 120, 30 130 Q -40 150, -90 95 Z" opacity="0.95"/>
    </g>

    <!-- Shopping bag (upper right) -->
    <g transform="translate(95, -45)" stroke="#ffffff" stroke-width="2.5" fill="#ffffff">
      <!-- Bag body -->
      <path d="M -22 -5 L -25 35 L 25 35 L 22 -5 Z" stroke-linejoin="round"/>
      <!-- Handle -->
      <path d="M -12 -5 Q -12 -22, 0 -22 Q 12 -22, 12 -5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Shopping cart (right, with motion lines) -->
    <g transform="translate(105, 60)" stroke="url(#goldCart)" stroke-width="3" fill="url(#goldCart)" stroke-linejoin="round" stroke-linecap="round">
      <!-- Cart basket -->
      <path d="M -30 -8 L 35 -8 L 28 22 L -22 22 Z" fill="none"/>
      <!-- Handle -->
      <path d="M -35 -15 L -45 -15" fill="none"/>
      <!-- Wheels -->
      <circle cx="-12" cy="32" r="5"/>
      <circle cx="22" cy="32" r="5"/>
      <!-- Motion lines -->
      <line x1="55" y1="-5" x2="80" y2="-5" stroke-width="2.5"/>
      <line x1="55" y1="8" x2="85" y2="8" stroke-width="2.5"/>
      <line x1="55" y1="20" x2="78" y2="20" stroke-width="2.5"/>
    </g>
  </g>

  <!-- ==================== HARRASSE TEXT ==================== -->
  <g transform="translate(300, 410)" text-anchor="middle">
    <text fill="url(#whiteText)" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="900" letter-spacing="6" filter="url(#softShadow)">HARRASSE</text>
    <!-- Gold triangle accent under A's -->
    <polygon points="-110,8 -103,22 -117,22" fill="url(#goldH)"/>
    <polygon points="65,8 72,22 58,22" fill="url(#goldH)"/>
  </g>

  <!-- ==================== DIVIDER + CART ==================== -->
  <g transform="translate(300, 470)">
    <!-- Left line -->
    <line x1="-180" y1="0" x2="-25" y2="0" stroke="url(#goldCart)" stroke-width="1.5"/>
    <!-- Right line -->
    <line x1="25" y1="0" x2="180" y2="0" stroke="url(#goldCart)" stroke-width="1.5"/>
    <!-- Mini cart icon in middle -->
    <g stroke="url(#goldCart)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -16 -8 L 16 -8 L 13 6 L -13 6 Z"/>
      <line x1="-20" y1="-12" x2="-16" y2="-8"/>
      <circle cx="-7" cy="11" r="2.5" fill="url(#goldCart)"/>
      <circle cx="9" cy="11" r="2.5" fill="url(#goldCart)"/>
    </g>
  </g>

  <!-- ==================== TAGLINE ==================== -->
  <g transform="translate(300, 510)" text-anchor="middle">
    <text fill="url(#goldCart)" font-family="Arial, sans-serif" font-size="20" font-weight="500" letter-spacing="8">E-COMMERCE  |  ONLINE</text>
  </g>

</svg>
