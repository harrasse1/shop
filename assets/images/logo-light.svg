<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="goldHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbe89a"/>
      <stop offset="20%" stop-color="#e6c560"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="80%" stop-color="#b88a25"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="darkText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b3d2e"/>
      <stop offset="100%" stop-color="#062b20"/>
    </linearGradient>
    <linearGradient id="goldCartL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a87c1f"/>
    </linearGradient>
  </defs>

  <!-- ICON GROUP (left side, smaller) -->
  <g transform="translate(110, 100)">
    <!-- Globe -->
    <g transform="translate(-58, 0)" stroke="#0b3d2e" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="32"/>
      <ellipse cx="0" cy="0" rx="32" ry="12"/>
      <ellipse cx="0" cy="0" rx="12" ry="32"/>
      <line x1="-32" y1="0" x2="32" y2="0"/>
    </g>
    <!-- Gold H -->
    <g fill="url(#goldHL)">
      <path d="M -28 -55 L -12 -55 L -12 55 L -28 55 Z"/>
      <path d="M 12 -55 L 28 -55 L 28 55 L 12 55 Z"/>
      <path d="M -28 -10 L 28 -10 L 28 10 L -28 10 Z"/>
      <path d="M -34 -55 L -6 -55 L -6 -50 L -34 -50 Z"/>
      <path d="M 6 -55 L 34 -55 L 34 -50 L 6 -50 Z"/>
      <path d="M -34 50 L -6 50 L -6 55 L -34 55 Z"/>
      <path d="M 6 50 L 34 50 L 34 55 L 6 55 Z"/>
      <path d="M -45 42 Q -15 65, 25 55 Q 45 50, 52 42 L 55 50 Q 45 60, 25 65 Q -15 70, -50 55 Z"/>
    </g>
    <!-- Bag -->
    <g transform="translate(50, -28)" fill="#0b3d2e">
      <path d="M -10 -3 L -12 14 L 12 14 L 10 -3 Z"/>
      <path d="M -6 -3 Q -6 -11, 0 -11 Q 6 -11, 6 -3" fill="none" stroke="#0b3d2e" stroke-width="2"/>
    </g>
    <!-- Cart -->
    <g transform="translate(58, 32)" stroke="url(#goldCartL)" stroke-width="2" fill="url(#goldCartL)">
      <path d="M -14 -4 L 16 -4 L 13 10 L -10 10 Z" fill="none"/>
      <path d="M -16 -7 L -22 -7" fill="none" stroke-linecap="round"/>
      <circle cx="-5" cy="15" r="2.5"/>
      <circle cx="10" cy="15" r="2.5"/>
      <line x1="22" y1="-2" x2="34" y2="-2" stroke-width="2"/>
      <line x1="22" y1="5" x2="36" y2="5" stroke-width="2"/>
    </g>
  </g>

  <!-- HARRASSE TEXT -->
  <g transform="translate(380, 100)" text-anchor="middle">
    <text fill="url(#darkText)" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="900" letter-spacing="3" dominant-baseline="middle">HARRASSE</text>
    <text y="42" fill="url(#goldCartL)" font-family="Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="5">E-COMMERCE  |  ONLINE</text>
  </g>
</svg>
