<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#f8faf6"/>
      <stop offset="100%" stop-color="#e8efe9"/>
    </radialGradient>

    <!-- Box gradients -->
    <linearGradient id="boxFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4d3a"/>
      <stop offset="50%" stop-color="#0b3d2e"/>
      <stop offset="100%" stop-color="#062b20"/>
    </linearGradient>
    <linearGradient id="boxSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b3d2e"/>
      <stop offset="100%" stop-color="#041b14"/>
    </linearGradient>
    <linearGradient id="boxTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a6d54"/>
      <stop offset="100%" stop-color="#1a4d3a"/>
    </linearGradient>

    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4e4a8"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a87c1f"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="2" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Decorative leaves -->
  <g opacity="0.08">
    <path d="M -20 100 Q 60 80, 100 130 T 200 110" stroke="#0b3d2e" stroke-width="3" fill="none"/>
    <ellipse cx="50" cy="110" rx="40" ry="12" fill="#0b3d2e" transform="rotate(-25 50 110)"/>
    <ellipse cx="350" cy="320" rx="50" ry="14" fill="#0b3d2e" transform="rotate(15 350 320)"/>
    <ellipse cx="380" cy="80" rx="40" ry="11" fill="#0b3d2e" transform="rotate(45 380 80)"/>
  </g>

  <!-- Floor shadow -->
  <ellipse cx="200" cy="345" rx="120" ry="14" fill="#000" opacity="0.18"/>

  <!-- BOX (3D look) -->
  <g filter="url(#shadow)">
    <!-- Right side (3D) -->
    <polygon points="280,90 320,70 320,310 280,330" fill="url(#boxSide)"/>

    <!-- Top -->
    <polygon points="120,90 280,90 320,70 160,70" fill="url(#boxTop)"/>

    <!-- Front face -->
    <rect x="120" y="90" width="160" height="240" fill="url(#boxFront)"/>

    <!-- Top accent line -->
    <line x1="120" y1="90" x2="280" y2="90" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>

    <!-- Decorative gold border at top -->
    <rect x="135" y="105" width="130" height="2" fill="url(#gold)" opacity="0.7"/>

    <!-- Forever Living small text -->
    <text x="200" y="135" text-anchor="middle" fill="#d4af37" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2">FOREVER</text>
    <text x="200" y="150" text-anchor="middle" fill="#a87c1f" font-family="Arial, sans-serif" font-size="9" letter-spacing="3" opacity="0.85">LIVING</text>

    <!-- Decorative line -->
    <line x1="160" y1="160" x2="240" y2="160" stroke="#d4af37" stroke-width="0.5" opacity="0.5"/>

    <!-- C9 Big text -->
    <text x="200" y="225" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="88" font-weight="900" filter="url(#glow)">C9</text>

    <!-- Subtitle -->
    <text x="200" y="255" text-anchor="middle" fill="#f4e4a8" font-family="Georgia, serif" font-size="14" font-style="italic" opacity="0.95">Clean 9</text>

    <!-- Description text -->
    <text x="200" y="280" text-anchor="middle" fill="#e8efe9" font-family="Arial, sans-serif" font-size="9" letter-spacing="1.5" opacity="0.85">9-DAY NUTRITIONAL</text>
    <text x="200" y="294" text-anchor="middle" fill="#e8efe9" font-family="Arial, sans-serif" font-size="9" letter-spacing="1.5" opacity="0.85">CLEANSING PROGRAM</text>

    <!-- Bottom accent -->
    <rect x="135" y="310" width="130" height="2" fill="url(#gold)" opacity="0.7"/>

    <!-- Aloe leaf accent -->
    <g transform="translate(155, 175)" opacity="0.4">
      <path d="M 0 0 Q 8 -3, 14 -10 Q 12 -3, 8 5 Q 4 4, 0 0 Z" fill="#d4af37"/>
    </g>
    <g transform="translate(245, 175) scale(-1,1)" opacity="0.4">
      <path d="M 0 0 Q 8 -3, 14 -10 Q 12 -3, 8 5 Q 4 4, 0 0 Z" fill="#d4af37"/>
    </g>
  </g>

  <!-- Aloe vera plant decoration (front) -->
  <g transform="translate(60, 280)" opacity="0.85">
    <path d="M 0 50 Q -5 10, 8 -10 Q 18 5, 12 50 Z" fill="#3fb389" stroke="#1a6b4e" stroke-width="1"/>
    <path d="M 0 50 Q -10 20, -22 5 Q -10 25, -5 50 Z" fill="#2a8a68" stroke="#0b3d2e" stroke-width="1"/>
    <path d="M 0 50 Q 12 20, 28 8 Q 14 28, 8 50 Z" fill="#3fb389" stroke="#1a6b4e" stroke-width="1"/>
    <ellipse cx="3" cy="52" rx="22" ry="4" fill="#0b3d2e"/>
  </g>

  <!-- Sparkles -->
  <g fill="#d4af37" opacity="0.6">
    <circle cx="80" cy="120" r="2"/>
    <circle cx="350" cy="180" r="2.5"/>
    <circle cx="60" cy="200" r="1.5"/>
    <circle cx="345" cy="260" r="2"/>
    <circle cx="90" cy="60" r="1.8"/>
  </g>

  <!-- "FOREVER" subtle bottom text -->
  <text x="200" y="385" text-anchor="middle" fill="#0b3d2e" font-family="Arial, sans-serif" font-size="9" letter-spacing="3" opacity="0.6">FOREVER LIVING PRODUCTS</text>
</svg>
